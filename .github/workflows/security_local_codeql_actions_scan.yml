name: Security CodeQL Github Actions check
on:
  workflow_dispatch:
  schedule:
    - cron: "00 05 * * *" # Every weekday at 05:00 UTC

permissions:
  contents: read
  actions: read
  security-events: write
jobs:
  security-actions-codeql-check:
    name: Project security Github Actions CodeQL check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@73fcfc4dcadcb4671963010917becb911fd4197d #v1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
