name: Build & push docker image and deploy to environment

on:
  workflow_call:
    inputs:
      docker_registry:
        description: Docker registry
        required: true
        type: string
      registry_org:
        description: Docker registry organisation
        required: true
        type: string
      additional_docker_tag:
        description: Additional docker tag that can be used to specify stable tags
        required: false
        type: string
      tag_latest:
        description: Tag docker image as 'latest'
        required: false
        type: boolean
        default: true
      upload_image_artifact:
        description: Upload image to artifacts in GitHub Actions
        required: false
        type: boolean
        default: false
      image_artifact_retention_days:
        description: Number of days to keep the image in artifacts
        required: false
        type: number
        default: 7
      additional_docker_build_args:
        description: Additional docker build arguments
        required: false
        type: string
      push:
        description: Push docker image to registry flag
        required: true
        type: boolean
      load:
        description: Load docker image into local docker
        required: false
        type: boolean
        default: false
      docker_multiplatform:
        description: Docker image build multiplatform or not
        required: true
        type: boolean
        default: true
      image_name:
        description: Name of the image
        required: false
        type: string
      file:
        description: "Path to the Dockerfile"
        required: false
        type: string
      download_build_artifacts:
        description: Whether to download the build artifacts prior to running the docker build
        required: false
        type: boolean
        default: false
      generate_sbom:
        description: Generate an SBOM for the final pushed image and upload it as a workflow artifact
        required: false
        type: boolean
        default: false
      attach_sbom_to_registry:
        description: Create and push an SBOM attestation for the pushed image in the container registry
        required: false
        type: boolean
        default: false
    secrets:
      HMPPS_QUAYIO_USER:
        required: false
      HMPPS_QUAYIO_TOKEN:
        required: false

    outputs:
      app_version:
        description: The version of the app as generated by create_app_version
        value: ${{ jobs.create_version.outputs.version }}

permissions:
  contents: read
  packages: write

jobs:
  create_version:
    name: Create app version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.app_version.outputs.version }}
    steps:
      - id: app_version
        name: Create application version
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/build-test-and-deploy/create_app_version@7277152a31c152f8d65ccdea0df7cceca7ab3856 # v1

  docker_build:
    name: Build linux/amd64 (single)
    if: ${{ ! inputs.docker_multiplatform }}
    needs: [create_version]
    runs-on: ubuntu-latest
    outputs:
      image_digest_ref: ${{ steps.resolve_image_digest.outputs.image_digest_ref }}
    steps:
      - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/build-test-and-deploy/build_docker@7277152a31c152f8d65ccdea0df7cceca7ab3856 # v1
        if: ${{ inputs.docker_registry == 'ghcr.io' }}
        with:
          image_name: ${{ inputs.image_name || github.event.repository.name }}
          docker_registry: ${{ inputs.docker_registry }}
          registry_org: ${{ inputs.registry_org }}
          additional_docker_tag: ${{ inputs.additional_docker_tag }}
          tag_latest: ${{ inputs.tag_latest }}
          upload_image_artifact: ${{ inputs.upload_image_artifact }}
          image_artifact_retention_days: ${{ inputs.image_artifact_retention_days }}
          push: ${{ inputs.push }}
          load: ${{ inputs.load }}
          app_version: ${{ needs.create_version.outputs.version }}
          additional_docker_build_args: ${{ inputs.additional_docker_build_args }}
          file: ${{ inputs.file }}
          download_build_artifacts: ${{ inputs.download_build_artifacts }}

      - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/build-test-and-deploy/build_docker@7277152a31c152f8d65ccdea0df7cceca7ab3856 # v1
        if: ${{ inputs.docker_registry == 'quay.io' }}
        with:
          image_name: ${{ inputs.image_name || github.event.repository.name }}
          docker_registry: ${{ inputs.docker_registry }}
          registry_org: ${{ inputs.registry_org }}
          additional_docker_tag: ${{ inputs.additional_docker_tag }}
          tag_latest: ${{ inputs.tag_latest }}
          upload_image_artifact: ${{ inputs.upload_image_artifact }}
          image_artifact_retention_days: ${{ inputs.image_artifact_retention_days }}
          push: ${{ inputs.push }}
          load: ${{ inputs.load }}
          app_version: ${{ needs.create_version.outputs.version }}
          HMPPS_QUAYIO_USER: ${{ secrets.HMPPS_QUAYIO_USER }}
          HMPPS_QUAYIO_TOKEN: ${{ secrets.HMPPS_QUAYIO_TOKEN}}
          additional_docker_build_args: ${{ inputs.additional_docker_build_args }}
          download_build_artifacts: ${{ inputs.download_build_artifacts }}

      - name: Setup ORAS
        if: ${{ inputs.push && inputs.docker_registry == 'ghcr.io' }}
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2

      - name: Login ORAS to ghcr.io
        if: ${{ inputs.push && inputs.docker_registry == 'ghcr.io' }}
        shell: bash
        run: |
          echo "${{ github.token }}" | oras login "${{ inputs.docker_registry }}" -u "${{ github.actor }}" --password-stdin

      # TODO: Remove this lookup once hmpps-github-shared-actions build_docker exposes pushed digest as an output.
      - name: Resolve image digest
        id: resolve_image_digest
        if: ${{ inputs.push && inputs.docker_registry == 'ghcr.io' }}
        shell: bash
        run: |
          IMAGE_REF="${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}:${{ needs.create_version.outputs.version }}"
          DIGEST=$(oras discover "$IMAGE_REF" --format json | jq -r '.digest // empty')
          if [[ -z "$DIGEST" ]]; then
            echo "Failed to resolve digest for $IMAGE_REF" >&2
            exit 1
          fi
          echo "image_digest_ref=${IMAGE_REF%:*}@${DIGEST}" >> "$GITHUB_OUTPUT"

  docker_build_platform:
    name: Build ${{ matrix.platform }} (parallel)
    if: ${{ inputs.docker_multiplatform }}
    needs: [create_version]
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download build artifacts needed for docker build
        if: ${{ inputs.download_build_artifacts }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-results

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Prepare platform pair
        id: prepare
        shell: bash
        run: |
          echo "platform_pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - name: Build docker archive tarball
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ${{ inputs.file }}
          build-args: |
            "BUILD_NUMBER=${{ needs.create_version.outputs.version }}"
            "GIT_REF=${{ github.sha }}"
            "GIT_BRANCH=${{ github.ref_name }}"
            "${{ inputs.additional_docker_build_args }}"
          outputs: type=docker,name=${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}:${{ needs.create_version.outputs.version }},dest=${{ runner.temp }}/image.tar
          cache-from: type=gha,scope=build-${{ steps.prepare.outputs.platform_pair }}
          cache-to: type=gha,scope=build-${{ steps.prepare.outputs.platform_pair }},mode=max
          provenance: false

      - name: Upload image tarball
        if: ${{ inputs.push || inputs.upload_image_artifact }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: image-${{ steps.prepare.outputs.platform_pair }}
          path: ${{ runner.temp }}/image.tar
          if-no-files-found: error
          retention-days: ${{ inputs.upload_image_artifact && inputs.image_artifact_retention_days || 1 }}

  docker_build_merge:
    name: Push multi-platform image
    if: ${{ inputs.docker_multiplatform && inputs.push }}
    needs: [create_version, docker_build_platform]
    uses: ./.github/workflows/docker_push.yml
    secrets:
      HMPPS_QUAYIO_USER: ${{ secrets.HMPPS_QUAYIO_USER }}
      HMPPS_QUAYIO_TOKEN: ${{ secrets.HMPPS_QUAYIO_TOKEN }}
    with:
      docker_registry: ${{ inputs.docker_registry }}
      registry_org: ${{ inputs.registry_org }}
      image_name: ${{ inputs.image_name }}
      app_version: ${{ needs.create_version.outputs.version }}
      tag_latest: ${{ inputs.tag_latest }}
      additional_docker_tag: ${{ inputs.additional_docker_tag }}
      docker_multiplatform: true

  generate_sbom_single_platform:
    name: Generate SBOM (single-platform image)
    if: ${{ inputs.generate_sbom && !inputs.docker_multiplatform && inputs.push && inputs.docker_registry == 'ghcr.io' }}
    needs: [create_version, docker_build]
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}:${{ needs.create_version.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Generate SBOM for pushed image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_REF }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}
          artifact-name: sbom-${{ inputs.image_name || github.event.repository.name }}-${{ needs.create_version.outputs.version }}.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json
          upload-artifact: true
          upload-release-assets: false

      - name: Prepare attestation subject
        id: prepare_attestation_subject
        if: ${{ inputs.attach_sbom_to_registry }}
        shell: bash
        run: |
          IMAGE_DIGEST_REF='${{ needs.docker_build.outputs.image_digest_ref }}'
          if [[ -z "$IMAGE_DIGEST_REF" ]]; then
            echo "Missing image digest output from docker_build job" >&2
            exit 1
          fi
          SUBJECT_NAME="${IMAGE_DIGEST_REF%@*}"
          SUBJECT_DIGEST="${IMAGE_DIGEST_REF#*@}"
          if [[ -z "$SUBJECT_NAME" || "$SUBJECT_NAME" == "$IMAGE_DIGEST_REF" ]]; then
            echo "Invalid subject name parsed from image digest ref: $IMAGE_DIGEST_REF" >&2
            exit 1
          fi
          if [[ ! "$SUBJECT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid subject digest format: $SUBJECT_DIGEST (expected sha256:<64 hex chars>)" >&2
            exit 1
          fi
          echo "subject_name=$SUBJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "subject_digest=$SUBJECT_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io for attestation
        if: ${{ inputs.attach_sbom_to_registry }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create SBOM attestation
        if: ${{ inputs.attach_sbom_to_registry }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ${{ steps.prepare_attestation_subject.outputs.subject_name }}
          subject-digest: ${{ steps.prepare_attestation_subject.outputs.subject_digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

  generate_sbom_multi_platform:
    name: Generate SBOM (multi-platform image)
    if: ${{ inputs.generate_sbom && inputs.docker_multiplatform && inputs.push && inputs.docker_registry == 'ghcr.io' }}
    needs: [create_version, docker_build_merge]
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}:${{ needs.create_version.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Generate SBOM for pushed image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_REF }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}
          artifact-name: sbom-${{ inputs.image_name || github.event.repository.name }}-${{ needs.create_version.outputs.version }}.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json
          upload-artifact: true
          upload-release-assets: false

      - name: Prepare attestation subject
        id: prepare_attestation_subject
        if: ${{ inputs.attach_sbom_to_registry }}
        shell: bash
        run: |
          IMAGE_DIGEST_REF='${{ needs.docker_build_merge.outputs.image_digest_ref }}'
          if [[ -z "$IMAGE_DIGEST_REF" ]]; then
            echo "Missing image digest output from docker_build_merge job" >&2
            exit 1
          fi
          SUBJECT_NAME="${IMAGE_DIGEST_REF%@*}"
          SUBJECT_DIGEST="${IMAGE_DIGEST_REF#*@}"
          if [[ -z "$SUBJECT_NAME" || "$SUBJECT_NAME" == "$IMAGE_DIGEST_REF" ]]; then
            echo "Invalid subject name parsed from image digest ref: $IMAGE_DIGEST_REF" >&2
            exit 1
          fi
          if [[ ! "$SUBJECT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid subject digest format: $SUBJECT_DIGEST (expected sha256:<64 hex chars>)" >&2
            exit 1
          fi
          echo "subject_name=$SUBJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "subject_digest=$SUBJECT_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io for attestation
        if: ${{ inputs.attach_sbom_to_registry }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create SBOM attestation
        if: ${{ inputs.attach_sbom_to_registry }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ${{ steps.prepare_attestation_subject.outputs.subject_name }}
          subject-digest: ${{ steps.prepare_attestation_subject.outputs.subject_digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false
