name: Security OWASP dependency check

on:
  workflow_call:
    inputs:
      channel_id:
        description: 'The slack channel ID to send a message on failure. If this is not provided then no message is sent.'
        required: false
        default: 'NO_SLACK'
        type: string
      subproject:
        description: 'For gradle multi module projects, leave blank for single module projects'
        required: false
        default: ''
        type: string
      slack_include_summary:
        description: 'boolean to include a summary of vulnerabilities in the Slack message'
        required: false
        default: true
        type: boolean
      nvd_feed_version:
        description: 'version of the NVD feed to use'
        required: false
        default: '1'
        type: string
      java_version:
        type: string
        required: false
        default: '21'
    secrets:
      HMPPS_SRE_SLACK_BOT_TOKEN:
        description: 'Slack bot token'
        required: false
      HMPPS_OSS_INDEX_USERNAME:
        description: 'Username for OWASP OSS Index analysis'
        required: false
      HMPPS_OSS_INDEX_PASSWORD:
        description: 'Password (API token) for OWASP OSS Index analysis'
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  # NVD v2 API version of the scan - using self-hosted runner
  security-owasp-check-nvd2:
    name: Security OWASP dependency check (NVD API 2)
    runs-on:  [ self-hosted, hmpps-github-actions-runner-security ]
    if: github.repository_owner == 'ministryofjustice' && inputs.nvd_feed_version == '2'
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'temurin'
        java-version: '${{ inputs.java_version }}'
    - name: Run gradle OWASP Dependency Check Analyse
      id: owasp-analyse
      run: ./gradlew ${{ inputs.subproject }}:dependencyCheckAnalyze -Pdatafeed.url='file:///opt/vulnz/cache' -PossIndex.username=${{ secrets.HMPPS_OSS_INDEX_USERNAME }} -PossIndex.password=${{ secrets.HMPPS_OSS_INDEX_PASSWORD }}
      continue-on-error: true
    - name: Sanitise sarif
      id: sanitise-sarif
      run: |
        jq '
          .runs |= map(
            if (.tool.driver.rules | type) == "array" then
              .tool.driver.rules |= map(
                (if (.id | type) == "string" then .id = .id[0:15] else . end)
                | (if (.shortDescription.text | type) == "string" and (.shortDescription.text | length) > 100 then .shortDescription.text = (.shortDescription.text[0:96] + "...") else . end)
                | .properties.cvss_score = (.properties.cvssv3_baseScore // .properties.cvssv3_score // .properties.cvssv2_score // .properties."security-severity")
                | .properties.cvss_severity = (.properties.cvssv3_baseSeverity // .properties.cvssv3_severity // .properties.cvssv2_severity)
              )
            else
              .
            end
            | if (.results | type) == "array" then
                .results |= map(
                  if (.ruleId | type) == "string" then .ruleId = .ruleId[0:15] else . end
                )
              else
                .
              end
          )
        ' "$SARIF_FILE" > "$SARIF_MOD_FILE"
      env:
        SARIF_FILE: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report.sarif
        SARIF_MOD_FILE: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif
      
    # Upload Sarif file: this will attempt to upload the sarif file for private/internal repositories as well
    - name: OWASP upload sarif
      id: owasp-upload-sarif
      uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
      with:
        sarif_file: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif
        category: gradle-owasp-dependency-check
      # don't stop the job even if Github Advanced Security isn't enabled
      continue-on-error: true
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      id: owasp-upload-artifact
      with:
        name: gradle-owasp-dependency-check-${{ inputs.subproject == '' && github.event.repository.name || inputs.subproject }}
        path: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report.html
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      id: owasp-upload-artifact-sarif
      with:
        name: gradle-owasp-dependency-check-${{ inputs.subproject == '' && github.event.repository.name || inputs.subproject }}-orig.json
        path: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-orig.sarif
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      id: owasp-upload-artifact-mod-sarif
      with:
        name: gradle-owasp-dependency-check-${{ inputs.subproject == '' && github.event.repository.name || inputs.subproject }}-mod.json
        path: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif
    - name: Prepare OWASP summary
      id: owasp-summary
      run: |
        formatted_output=$(jq -r '.runs[0].tool.driver.rules[] | [.id, .shortDescription.text, .properties.cvss_score, .properties.cvss_severity] | @tsv' ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif \
        | awk -F'\t' '{print $1" - "$NF" ("$(NF-1)") - "substr($2,index($2,":")+1)}' \
        | awk '{printf "%s\\n", $0}') 
        echo "Vulnerability Summary"
        echo "====================="
        echo "${formatted_output}" | sed 's/\\n/\n/g'
        slack_summary="$(echo "${formatted_output}" | awk '{s=s $0} END {if (length(s) >= 3000) print substr(s, 1, 2997) "..."; else print s}')"
        echo "summary=${slack_summary}" >> $GITHUB_OUTPUT
    - name: Gradle OWASP slack notification
      uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_codescan_notification@fddc5f11d6a8ce9b82a06fe76268835bfd99bcd4 # v1
      if: (failure() || steps.owasp-analyse.outcome == 'failure') && inputs.channel_id != 'NO_SLACK'
      with:
        title: "Gradle OWASP"
        warningOnly: ${{ steps.owasp-upload-sarif.outcome == 'success' && steps.owasp-upload-artifact.outcome == 'success' }}
        channel_id: ${{ inputs.channel_id}}
        SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
        subproject: ${{ inputs.subproject }}
        summary: ${{ inputs.slack_include_summary && steps.owasp-summary.outputs.summary || '' }}
  # Previous NVD API version - this will no longer be default when the database is no longer available
  security-owasp-check-nvd1:
    name: Security OWASP dependency check (NVD API 1)
    runs-on:  ubuntu-latest
    if: inputs.nvd_feed_version == '1'
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Run gradle OWASP Dependency Check Analyse
      id: owasp-analyse
      run: ./gradlew ${{ inputs.subproject }}:dependencyCheckAnalyze --info
      continue-on-error: true
    - name: Sanitise sarif
      id: sanitise-sarif
      run: |
        jq '
          .runs |= map(
            if (.tool.driver.rules | type) == "array" then
              .tool.driver.rules |= map(
                (if (.id | type) == "string" then .id = .id[0:15] else . end)
                | (if (.shortDescription.text | type) == "string" and (.shortDescription.text | length) > 100 then .shortDescription.text = (.shortDescription.text[0:96] + "...") else . end)
                | .properties.cvss_score = (.properties.cvssv3_baseScore // .properties.cvssv3_score // .properties.cvssv2_score // .properties."security-severity")
                | .properties.cvss_severity = (.properties.cvssv3_baseSeverity // .properties.cvssv3_severity // .properties.cvssv2_severity)
              )
            else
              .
            end
            | if (.results | type) == "array" then
                .results |= map(
                  if (.ruleId | type) == "string" then .ruleId = .ruleId[0:15] else . end
                )
              else
                .
              end
          )
        ' "$SARIF_FILE" > "$SARIF_MOD_FILE"
      env:
        SARIF_FILE: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report.sarif
        SARIF_MOD_FILE: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif
    # Upload Sarif file: this will attempt to upload the sarif file for private/internal repositories as well
    - name: OWASP upload sarif
      id: owasp-upload-sarif
      uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
      with:
        sarif_file: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif
        category: gradle-owasp-dependency-check
      # don't stop the job even if Github Advanced Security isn't enabled
      continue-on-error: true
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      id: owasp-upload-artifact
      with:
        name: gradle-owasp-dependency-check-${{ inputs.subproject == '' && github.event.repository.name || inputs.subproject }}
        path: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report.html
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      id: owasp-upload-artifact-sarif
      with:
        name: gradle-owasp-dependency-check-${{ inputs.subproject == '' && github.event.repository.name || inputs.subproject }}.json
        path: ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif
    - name: Prepare OWASP summary
      id: owasp-summary
      run: |
        formatted_output=$(jq -r '.runs[0].tool.driver.rules[] | [.id, .shortDescription.text, .properties.cvss_score, .properties.cvss_severity] | @tsv' ${{ inputs.subproject == '' && '.' || inputs.subproject }}/build/reports/dependency-check-report-mod.sarif \
        | awk -F'\t' '{print $1" - "$NF" ("$(NF-1)") - "substr($2,index($2,":")+1)}' \
        | awk '{printf "%s\\n", $0}') 
        echo "Vulnerability Summary"
        echo "====================="
        echo "${formatted_output}" | sed 's/\\n/\n/g'
        slack_summary="$(echo "${formatted_output}" | awk '{s=s $0} END {if (length(s) >= 3000) print substr(s, 1, 2997) "..."; else print s}')"
        echo "summary=${slack_summary}" >> $GITHUB_OUTPUT
    - name: Gradle OWASP slack notification
      uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_codescan_notification@fddc5f11d6a8ce9b82a06fe76268835bfd99bcd4 # v1
      if: (failure() || steps.owasp-analyse.outcome == 'failure') && inputs.channel_id != 'NO_SLACK'
      with:
        title: "Gradle OWASP"
        warningOnly: ${{ steps.owasp-upload-sarif.outcome == 'success' && steps.owasp-upload-artifact.outcome == 'success' }}
        channel_id: ${{ inputs.channel_id}}
        SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
        subproject: ${{ inputs.subproject }}
        summary: ${{ inputs.slack_include_summary && steps.owasp-summary.outputs.summary || '' }}

