name: Security Snyk dependency check (for privately hosted docker images)```

on:
  workflow_call:
    inputs:
      channel_id:
        description: 'The slack channel ID to send a message on failure. If this is not provided then no message is sent.'
        required: false
        default: 'NO_SLACK'
        type: string
      subproject:
        description: 'For gradle multi module projects, leave blank for single module projects'
        required: false
        default: ''
        type: string
      severity:
        description: 'Customisable severity levels'
        required: false
        default: 'critical,high'
        type: string
      slack_include_summary:
        description: 'boolean to include a summary of vulnerabilities in the Slack message'
        required: false
        default: true
        type: boolean
      scan_type:
        description: 'A scan type to use - either image (default) or fs'
        required: false
        default: 'image'
        type: string
      location:
        description: 'A location for scans to take place'
        required: false
        default: '.'
        type: string
      snyk_policy_path:
        description: 'Optional path to .snyk policy file used for ignore rules'
        required: false
        default: ''
        type: string
    secrets:
      HMPPS_SRE_SLACK_BOT_TOKEN:
        description: 'Slack bot token'
        required: false
      HMPPS_SNYK_API_KEY:
        description: 'Snyk token'
        required: false
      HMPPS_SNYK_CLIENT_ID:
        description: 'Snyk client ID'
        required: false
      HMPPS_SNYK_CLIENT_SECRET:
        description: 'Snyk client secret'
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  security-snyk-check:
    name: Security snyk dependency check
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      packages: read
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run Snyk Security Scan
        id: snyk-scan
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/snyk-scan@feat/HEAT-1270
        with:
          subproject: ${{ inputs.subproject }}
          severity: ${{ inputs.severity }}
          scan_type: ${{ inputs.scan_type }}
          location: ${{ inputs.location }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          client_id: ${{ secrets.HMPPS_SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.HMPPS_SNYK_CLIENT_SECRET }}
          snyk_token: ${{ secrets.HMPPS_SNYK_API_KEY }}
          snyk_policy_path: ${{ inputs.snyk_policy_path }}

      - name: Snyk slack notification
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_snyk_scan_notification@feat/HEAT-1270
        if: (failure() || steps.snyk-scan.outcome == 'failure' || steps.snyk-scan.outputs.results_count > 0) && inputs.channel_id != 'NO_SLACK'
        with:
          title: 'Snyk'
          warningOnly: ${{ steps.snyk-scan.outputs.sarif_upload_outcome == 'success' }}
          channel_id: ${{ inputs.channel_id }}
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
          subproject: ${{ inputs.subproject }}
          scan_context: ${{ inputs.scan_type }}
          summary: ${{ inputs.slack_include_summary && steps.snyk-scan.outputs.summary || '' }}
