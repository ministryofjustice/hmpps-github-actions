name: Generate SBOM and optionally attest image

on:
  workflow_call:
    inputs:
      docker_registry:
        description: Docker registry
        required: true
        type: string
      registry_org:
        description: Docker registry organisation
        required: true
        type: string
      image_name:
        description: Name of the image
        required: false
        type: string
      app_version:
        description: App version
        required: true
        type: string
      image_digest:
        description: Image digest (sha256:<64 hex chars>) used for attestation
        required: false
        type: string
      attach_sbom_to_registry:
        description: Create and push an SBOM attestation for the pushed image in the container registry
        required: false
        type: boolean
        default: false

jobs:
  generate_sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}:${{ inputs.app_version }}
    steps:
      - name: Generate SBOM for pushed image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_REF }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}
          artifact-name: sbom-${{ inputs.image_name || github.event.repository.name }}-${{ inputs.app_version }}.cdx.json
          output-file: sbom.cdx.json
          format: cyclonedx-json
          upload-artifact: true
          upload-release-assets: false

      - name: Prepare attestation subject
        id: prepare_attestation_subject
        if: ${{ inputs.attach_sbom_to_registry }}
        shell: bash
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          SUBJECT_NAME: ${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}
        run: |
          if [[ -z "${IMAGE_DIGEST}" ]]; then
            echo "Missing image digest input" >&2
            exit 1
          fi
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid digest format: ${IMAGE_DIGEST} (expected sha256:<64 hex chars>)" >&2
            exit 1
          fi
          echo "subject_name=${SUBJECT_NAME}" >> "${GITHUB_OUTPUT}"
          echo "subject_digest=${IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Login to registry for attestation
        if: ${{ inputs.attach_sbom_to_registry }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create SBOM attestation
        if: ${{ inputs.attach_sbom_to_registry }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ steps.prepare_attestation_subject.outputs.subject_name }}
          subject-digest: ${{ steps.prepare_attestation_subject.outputs.subject_digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true
          create-storage-record: false
