name: Test - helm lint

on:
  workflow_call:
    inputs:
      environment:
        description: environment for deployment
        required: false
        default: 'dev'
        type: string
      chart_name:
        description: name of the helm chart - defaults to the repo name
        required: false
        default: ${{ github.event.repository.name  }}
        type: string
      helm_dir:
        description: directory of the helm charts
        required: false
        default: 'helm_deploy'
        type: string
      helm_additional_args:
        required: false
        default: ''
        type: string
    secrets:
      HMPPS_SRE_SLACK_BOT_TOKEN:
        description: 'Slack bot token'
        required: false

permissions:
  contents: read

jobs:
  helm_lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/tool-installers/setup-helm@c241b9febb7a4fc11e88d0e781cbdfcf8abd84a5 # v1.0.17
    - name: 'Run helm lint commands'
      shell: bash
      env:
        HELM_DIR: ${{ inputs.helm_dir }}
        CHART_NAME: ${{ inputs.chart_name }}
        ENVIRONMENT: ${{ inputs.environment }}
        HELM_ADDITIONAL_ARGS: ${{ inputs.helm_additional_args }}
      run: | 
          set -euo pipefail

          cd "${HELM_DIR}"
          helm dependency update "${CHART_NAME}"

          extra_args=()
          if [[ -n "${HELM_ADDITIONAL_ARGS}" ]]; then
            read -r -a extra_args <<< "${HELM_ADDITIONAL_ARGS}"
          fi

          helm lint "${CHART_NAME}" --values "values-${ENVIRONMENT}.yaml" "${extra_args[@]}"
