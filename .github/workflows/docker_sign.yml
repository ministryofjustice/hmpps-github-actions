name: Sign container image

on:
  workflow_call:
    inputs:
      docker_registry:
        description: Docker registry (currently only ghcr.io is supported)
        required: true
        type: string
      registry_org:
        description: Docker registry organisation
        required: true
        type: string
      image_name:
        description: Name of the image
        required: false
        type: string
      image_digest:
        description: Image digest (sha256:<64 hex chars>) to sign
        required: true
        type: string

jobs:
  sign_image:
    name: Sign image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ inputs.docker_registry }}/${{ inputs.registry_org }}/${{ inputs.image_name || github.event.repository.name }}
    steps:
      - name: Validate docker registry
        shell: bash
        env:
          REGISTRY: ${{ inputs.docker_registry }}
        run: |
          if [[ "${REGISTRY}" != "ghcr.io" ]]; then
            echo "Unsupported docker_registry: ${REGISTRY}" >&2
            echo "This workflow currently supports only ghcr.io for keyless signing." >&2
            exit 1
          fi

      - name: Validate image digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
        run: |
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid digest format: ${IMAGE_DIGEST} (expected sha256:<64 hex chars>)" >&2
            exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Sign image with cosign keyless
        shell: bash
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
        run: |
          cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
